name: Baseline PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline-pr-validation:
    name: Baseline PR Validation
    if: github.event_name != 'pull_request' || github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate CI toolchain
        run: |
          node --version
          pnpm --version

      - name: Gate - pnpm check
        run: pnpm check

      - name: Gate - pnpm typecheck
        run: pnpm typecheck

      - name: Gate - pnpm test
        run: pnpm test
