name: Baseline PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changed-path-groups:
    name: Detect changed high-risk paths
    runs-on: ubuntu-latest
    outputs:
      auth_changed: ${{ steps.detect_pr_paths.outputs.auth || steps.default_non_pr_paths.outputs.auth_changed }}
      api_changed: ${{ steps.detect_pr_paths.outputs.api || steps.default_non_pr_paths.outputs.api_changed }}
      runtime_changed: ${{ steps.detect_pr_paths.outputs.runtime || steps.default_non_pr_paths.outputs.runtime_changed }}
      ui_changed: ${{ steps.detect_pr_paths.outputs.ui || steps.default_non_pr_paths.outputs.ui_changed }}
      tests_changed: ${{ steps.detect_pr_paths.outputs.tests || steps.default_non_pr_paths.outputs.tests_changed }}

    steps:
      - name: Detect changed paths for pull requests
        id: detect_pr_paths
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          filters: |
            auth:
              - "app/api/auth/**"
              - "components/auth/**"
              - "lib/auth.ts"
            api:
              - "app/api/**"
            runtime:
              - "infra/**"
              - "lib/aws/**"
              - "lib/env.ts"
              - "lib/rate-limit.ts"
              - "wrangler.toml"
            ui:
              - "app/**"
              - "components/**"
              - "hooks/**"
              - "!app/api/**"
            tests:
              - "tests/**"
              - "**/*.test.ts"
              - "**/*.test.tsx"
              - "**/*.spec.ts"
              - "**/*.spec.tsx"

      - name: Default changed-path outputs for non-PR runs
        id: default_non_pr_paths
        if: github.event_name != 'pull_request'
        run: |
          echo "auth_changed=true" >> "$GITHUB_OUTPUT"
          echo "api_changed=true" >> "$GITHUB_OUTPUT"
          echo "runtime_changed=true" >> "$GITHUB_OUTPUT"
          echo "ui_changed=true" >> "$GITHUB_OUTPUT"
          echo "tests_changed=true" >> "$GITHUB_OUTPUT"

  baseline-pr-validation:
    name: Baseline PR Validation
    if: github.event_name != 'pull_request' || github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate CI toolchain
        run: |
          node --version
          pnpm --version

      - name: Gate - pnpm check
        id: gate_check
        if: always()
        continue-on-error: true
        run: pnpm check

      - name: Gate - pnpm typecheck
        id: gate_typecheck
        if: always()
        continue-on-error: true
        run: pnpm typecheck

      - name: Gate - pnpm test
        id: gate_test
        if: always()
        continue-on-error: true
        run: pnpm test

      - name: Baseline gate summary
        if: always()
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          check_status="${{ steps.gate_check.outcome }}"
          typecheck_status="${{ steps.gate_typecheck.outcome }}"
          test_status="${{ steps.gate_test.outcome }}"

          status_icon() {
            if [ "$1" = "success" ]; then
              printf "✅ Pass"
            else
              printf "❌ Fail"
            fi
          }

          signal_text() {
            if [ "$1" = "success" ]; then
              printf "-"
            else
              printf "[View run logs](%s) → expand `%s`" "$run_url" "$2"
            fi
          }

          {
            echo "## Baseline PR gate summary"
            echo
            echo "| Gate | Status | Failure signal |"
            echo "| --- | --- | --- |"
            printf "| pnpm check | %s | %s |\n" "$(status_icon "$check_status")" "$(signal_text "$check_status" "Gate - pnpm check")"
            printf "| pnpm typecheck | %s | %s |\n" "$(status_icon "$typecheck_status")" "$(signal_text "$typecheck_status" "Gate - pnpm typecheck")"
            printf "| pnpm test | %s | %s |\n" "$(status_icon "$test_status")" "$(signal_text "$test_status" "Gate - pnpm test")"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce baseline gate result
        if: always()
        run: |
          failed=0

          if [ "${{ steps.gate_check.outcome }}" != "success" ]; then
            failed=1
          fi

          if [ "${{ steps.gate_typecheck.outcome }}" != "success" ]; then
            failed=1
          fi

          if [ "${{ steps.gate_test.outcome }}" != "success" ]; then
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "One or more baseline gates failed. See job summary for details."
            exit 1
          fi
