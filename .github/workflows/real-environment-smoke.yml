name: Real-Environment Smoke Verification

on:
  workflow_dispatch:
    inputs:
      enable_s5_environment_probe:
        description: "Run optional S5 environment probe (/api/costs)"
        required: false
        default: false
        type: boolean
      require_s5_environment_probe:
        description: "Treat S5 optional probe as required"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read

jobs:
  real-environment-smoke:
    name: Real-environment smoke contract (S1-S5)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: real-environment-smoke
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke contract (S1-S5) and publish operator summary
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_SESSION_COOKIE: ${{ secrets.SMOKE_SESSION_COOKIE }}
          SMOKE_ENVIRONMENT_LABEL: ${{ vars.SMOKE_ENVIRONMENT_LABEL || 'real-smoke' }}
          SMOKE_EXPECT_DOMAIN: ${{ vars.SMOKE_EXPECT_DOMAIN || '' }}
          SMOKE_EXPECT_BACKEND_MODE: ${{ vars.SMOKE_EXPECT_BACKEND_MODE || 'aws' }}
          SMOKE_ENABLE_S5_ENVIRONMENT_PROBE: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_s5_environment_probe || vars.SMOKE_ENABLE_S5_ENVIRONMENT_PROBE || 'false' }}
          SMOKE_REQUIRE_S5_ENVIRONMENT_PROBE: ${{ github.event_name == 'workflow_dispatch' && inputs.require_s5_environment_probe || vars.SMOKE_REQUIRE_S5_ENVIRONMENT_PROBE || 'false' }}
          SMOKE_SUMMARY_OUTPUT_PATH: artifacts/real-environment-smoke-summary.md
        run: pnpm exec tsx scripts/run-real-environment-smoke.ts

      - name: Upload smoke summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-environment-smoke-summary
          path: artifacts/real-environment-smoke-summary.md
          if-no-files-found: warn
